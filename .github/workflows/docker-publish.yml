# =============================================================================
# Publish image — builds the production server image and pushes a single
# multi-arch manifest to ghcr.io/<owner>/certifi.
#
# Each architecture builds NATIVELY on its own runner (amd64 on ubuntu-latest,
# arm64 on ubuntu-24.04-arm) — a Rust release build under QEMU emulation is
# far too slow. Each runner pushes its image by *digest* (no tag), then a final
# `merge` job stitches the per-arch digests into one tagged manifest list. This
# mirrors how `release.yml` builds the standalone binaries natively per arch.
#
# Triggers / tags:
#   • push to main      → `edge`
#   • push of vX.Y.Z    → `X.Y.Z`, `X.Y`, and `latest`
#   • workflow_dispatch  → build & publish an existing tag passed as input
#     (used to publish a release whose tag was pushed before this workflow
#     existed); leave the input blank to build the current ref.
#
# NOTE: the first run creates the GHCR package as PRIVATE. To let `docker pull`
# work anonymously and for the README ghcr-badge to render, set the package to
# Public once: GitHub → your profile → Packages → certifi → Package settings →
# Change visibility → Public (and "Connect repository" to inherit access).
# =============================================================================

name: Publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build & publish (e.g. v1.1.0). Leave blank to build the current ref."
        required: false

# Don't pile up publishes for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ghcr.io/jseifeddine/certifi

jobs:
  # Build one architecture per runner and push it to GHCR addressed only by its
  # content digest (push-by-digest=true). No tags are attached here.
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: ubuntu-latest }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the dispatched tag's source when given, else the trigger ref.
          ref: ${{ github.event.inputs.tag || github.ref }}

      # "linux/amd64" -> "linux-amd64" for use in cache scopes / artifact names.
      - name: Derive platform slug
        id: slug
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image labels (source, revision, etc.) shared across both arches.
      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-arch cache so the two runners don't clobber each other's layers.
          cache-from: type=gha,scope=${{ steps.slug.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.slug.outputs.pair }}
          # Provenance attestations add extra manifest entries that confuse the
          # by-digest merge below — turn them off.
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"
        env:
          digest: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.slug.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single tagged multi-arch manifest.
  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag set:
      #   • push to main          → `edge`
      #   • vX.Y.Z tag push       → `X.Y.Z`, `X.Y`, `latest`
      #   • dispatch with `tag`   → same semver set for that existing tag
      # `value=` is empty on push events, so semver falls back to the git ref.
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag }}
          flavor: |
            latest=${{ github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
