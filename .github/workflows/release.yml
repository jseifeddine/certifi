# =============================================================================
# Release binaries — builds the server (`certifi`) and CLI (`certifi-cli`) for
# linux/amd64 and linux/arm64 and attaches them to the GitHub release for the
# tag.
#
# Triggers:
#   • push of a vX.Y.Z tag  → build for that tag (creating the release if the
#     tag push didn't already).
#   • workflow_dispatch      → build for an existing tag passed as input (used
#     to attach binaries to a release whose tag was pushed before this workflow
#     existed).
#
# Each architecture builds NATIVELY on its own runner (amd64 on ubuntu-latest,
# arm64 on ubuntu-24.04-arm) rather than cross-compiling — the server links
# against the system OpenSSL, which is painful to cross-compile but trivial to
# apt-install on a native runner.
# =============================================================================

name: Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach binaries to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # Make sure a release exists for the tag before the build jobs upload to it.
  # On a fresh tag push this creates it; for a dispatch against an existing
  # release it's a no-op (so hand-written release notes are preserved).
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a release exists for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Certifi $TAG" --generate-notes
          fi

  build:
    needs: ensure-release
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the released source, not whatever main happens to be.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: ver
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install system deps (OpenSSL)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked -p certifi-server -p certifi-client

      - name: Stage + checksum artifacts
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          mkdir -p dist
          cp target/release/certifi     "dist/certifi-${TAG}-linux-${{ matrix.arch }}"
          cp target/release/certifi-cli "dist/certifi-cli-${TAG}-linux-${{ matrix.arch }}"
          ( cd dist && sha256sum certifi-* > "SHA256SUMS-${TAG}-linux-${{ matrix.arch }}.txt" )
          ls -la dist

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" dist/* \
            --repo "$GITHUB_REPOSITORY" --clobber
