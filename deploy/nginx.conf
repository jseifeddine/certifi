server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache static asset bundles (Vite emits content-hashed filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API to the Rust backend on the `certifi` service.
  location /api/ {
    proxy_pass http://certifi:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Certificate issuance can take 30-90s — give the upstream room.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
  }

  # SSE: don't buffer, don't gzip, allow the long-lived response to stream.
  # The Rust server sends a keep-alive comment every 15s so this connection
  # never goes idle long enough for any upstream proxy to reap it.
  location /api/events {
    proxy_pass http://certifi:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_read_timeout 24h;
    chunked_transfer_encoding on;
  }

  # SPA fallback: let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
